services:
  postgres:
    image: postgres:16-alpine
    container_name: profit-guard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: profit_guard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d profit_guard"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - profit_guard_postgres_data:/var/lib/postgresql/data

volumes:
  profit_guard_postgres_data:
