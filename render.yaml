services:
  - type: web
    name: profit-guard-web
    runtime: docker
    plan: standard
    region: oregon
    dockerfilePath: ./docker/render/web.Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: off
    preDeployCommand: pnpm db:migrate:deploy
    buildFilter:
      paths:
        - apps/web/**
        - packages/db/**
        - docker/render/web.Dockerfile
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - tsconfig.base.json
        - render.yaml
      ignoredPaths:
        - apps/web/build/**
        - apps/worker/dist/**
        - docs/**
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: profit-guard-postgres
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: REQUIRE_DATABASE
        value: "true"
      - key: SCOPES
        value: read_orders,write_orders,read_products,write_products,read_inventory
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: BILLING_TEST_MODE
        value: "false"
      - key: SHOPIFY_BILLING_MODE
        value: managed
      - key: SHOPIFY_MANAGED_PRICING_APP_HANDLE
        value: profit-guard-22
      - key: PROFIT_GUARD_BILLING_CURRENCY
        value: USD
      - key: PROFIT_GUARD_STARTER_PRICE
        value: "29"
      - key: PROFIT_GUARD_GROWTH_PRICE
        value: "79"
      - key: PROFIT_GUARD_TRIAL_DAYS
        value: "14"
      - key: PROFIT_GUARD_SUPPORT_EMAIL
        sync: false
      - key: PROFIT_GUARD_EMAIL_PROVIDER
        value: resend
      - key: PROFIT_GUARD_EMAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: PROFIT_GUARD_RESEND_BASE_URL
        value: https://api.resend.com
      - key: PROFIT_GUARD_AI_PROVIDER
        value: openrouter
      - key: PROFIT_GUARD_OPENROUTER_MODEL
        value: z-ai/glm-5.1
      - key: PROFIT_GUARD_OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: PROFIT_GUARD_OPENROUTER_APP_TITLE
        value: Profit Guard
      - key: OPENROUTER_API_KEY
        sync: false
      - key: PROFIT_GUARD_ENABLE_DIGEST_SCHEDULER
        value: "false"

  - type: worker
    name: profit-guard-worker
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./docker/render/worker.Dockerfile
    dockerContext: .
    autoDeployTrigger: off
    preDeployCommand: pnpm db:migrate:deploy
    buildFilter:
      paths:
        - apps/worker/**
        - packages/db/**
        - docker/render/worker.Dockerfile
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - tsconfig.base.json
        - render.yaml
      ignoredPaths:
        - apps/web/build/**
        - apps/worker/dist/**
        - docs/**
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: profit-guard-postgres
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: REQUIRE_DATABASE
        value: "true"
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SCOPES
        value: read_orders,write_orders,read_products,write_products,read_inventory
      - key: BILLING_TEST_MODE
        value: "false"
      - key: SHOPIFY_BILLING_MODE
        value: managed
      - key: SHOPIFY_MANAGED_PRICING_APP_HANDLE
        value: profit-guard-22
      - key: PROFIT_GUARD_BILLING_CURRENCY
        value: USD
      - key: PROFIT_GUARD_STARTER_PRICE
        value: "29"
      - key: PROFIT_GUARD_GROWTH_PRICE
        value: "79"
      - key: PROFIT_GUARD_TRIAL_DAYS
        value: "14"
      - key: PROFIT_GUARD_SUPPORT_EMAIL
        sync: false
      - key: PROFIT_GUARD_EMAIL_PROVIDER
        value: resend
      - key: PROFIT_GUARD_EMAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: PROFIT_GUARD_RESEND_BASE_URL
        value: https://api.resend.com
      - key: PROFIT_GUARD_AI_PROVIDER
        value: openrouter
      - key: PROFIT_GUARD_OPENROUTER_MODEL
        value: z-ai/glm-5.1
      - key: PROFIT_GUARD_OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: PROFIT_GUARD_OPENROUTER_APP_TITLE
        value: Profit Guard
      - key: OPENROUTER_API_KEY
        sync: false
      - key: PROFIT_GUARD_ENABLE_DIGEST_SCHEDULER
        value: "true"
      - key: WORKER_POLL_INTERVAL_MS
        value: "5000"
      - key: WORKER_DIGEST_INTERVAL_MS
        value: "60000"
      - key: WORKER_DIGEST_DELIVERY_LIMIT
        value: "20"

databases:
  - name: profit-guard-postgres
    plan: basic-1gb
    region: oregon
    postgresMajorVersion: "16"
    diskSizeGB: 15
    storageAutoscalingEnabled: true
    ipAllowList: []
